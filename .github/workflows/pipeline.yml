name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  packages: write

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codice
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build con Maven
      run: mvn clean package -DskipTests

    - name: Esegui Unit Test
      run: mvn test

    - name: Pubblica risultati test
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: target/surefire-reports/

    - name: SonarCloud Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn sonar:sonar \
          -Dsonar.projectKey=dbalzamo_devops-lab \
          -Dsonar.organization=el-dariito \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN

    - name: Pubblica JAR su GitHub Packages
      run: mvn deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout codice
      uses: actions/checkout@v3

    - name: Login su Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build e Push immagine Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/devops-lab:latest
          ${{ secrets.DOCKER_USERNAME }}/devops-lab:${{ github.sha }}

  deploy:
    name: Deploy su Kubernetes
    runs-on: self-hosted
    needs: docker

    steps:
    - name: Verifica cluster K8s
      run: kubectl get nodes

    - name: Deploy applicazione
      run: |
        kubectl apply -f deployment.yaml
        kubectl apply -f service.yaml

    - name: Attendi che il deploy sia completato
      run: kubectl rollout status deployment/spring-app --timeout=120s

    - name: Verifica pod in esecuzione
      run: kubectl get pods
